<!DOCTYPE html>
<html>
<head>
    <title>Semantic Web Page</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }
        header, nav, main, section, article, aside, footer {
            padding: 15px;
            margin: 10px;
            border: 1px solid black;
        }
        nav a {
            margin-right: 10px;
        }
        .container {
            display: flex;
        }
        main {
            flex: 3;
        }
        aside {
            flex: 1;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Website</h1>
        <p>Welcome to my simple semantic webpage</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">
        <main>
            <section>
                <h2>About Me</h2>
                <p>I am learning HTML and semantic tags.</p>
            </section>

            <article>
                <h2>Latest Post</h2>
                <p>This is my first semantic webpage example.</p>
            </article>
        </main>

        <aside>
            <h3>Sidebar</h3>
            <p>Related links and ads can go here.</p>
        </aside>
    </div>

    <footer>
        <p>© 2026 My Website | All Rights Reserved</p>
    </footer>

</body>
</html>
