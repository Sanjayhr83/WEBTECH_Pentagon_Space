<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--input types in html-->
    <form>
        <fieldset>
            <legend>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username"><br>

                <label for="pass">password</label>
                <input type="password" id="pass" name="password"><br>

                <label for="num">Number:</label>
                <input type="number" id="num" name="number"><br>

                <label for="range">range:</label>
                <input type="range" id="range" name="range"><br>

                <label for="date">date:</label>
                <input type="date" id="date" name="date"><br>

                <label for="email">email:</label>
                <input type="email" id="email" name="email"><br>

                <label for="tel">Phone:</label>
                <input type="tel" id="tel" name="phone"><br>

                <label for="file">File:</label>
                <input type="file" id="file" name="file"><br>
                
                <label for="color">color:</label>
                <input type="color" id="color" name="color"><br>

                <label for="choice">choice:</label><br>
                A<input type="checkbox" id="choice1" name="choice"><br>
                B<input type="checkbox" id="choice2" name="choice"><br>
                C<input type="checkbox" id="choice3" name="choice"><br>

                <label for="anyone">gender:</label><br>
                male<input type="radio" id="male" name="gender"><br>
                female<input type="radio" id="female" name="gender"><br>
                other<input type="radio" id="other" name="gender"><br>

                <select name="country" id="country">
                    <option value="USA">USA</option>
                    <option value="india" selected>India</option>
                    <option value="uk">UK</option>
                    <option value="russia">Russia</option>
                    <option value="pak">Pakistan</option>
                    <option value="china">China</option>
                </select><br>
                
                <textarea name="txt" id="txt" placeholder="text area"></textarea>
            </legend>
        </fieldset>
</body>
</html>
