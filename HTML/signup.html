<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <form>
        <fieldset>
            <legend>SIGN-UP</legend>
            <label for="fname">First Name:</label>

        </fieldset>
    </form>
