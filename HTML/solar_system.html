<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            padding:0;
            margin:0;
            height:100vh;
            width:100vw;
            display:flex;
            justify-content: space-evenly;
            align-items:center;
            background-image: url(https://images.rawpixel.com/image_800/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDIyLTA1L3B4MTM2NjcxMC1pbWFnZS1rd3Z4eGVxcC5qcGc.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }
        /*SUN*/
        #sun{
            height:150px;
            width:150px;
            border-radius:50%;
            border: 0.5px solid yellow;
            background-image: url(https://www.pngkey.com/png/full/7-73554_sun-transparent-background-download-sun-clipart-science.png);
            background-size: cover;
            background-position: center;
        }
        /*MERCURY HARBIT*/
        #solarsystem{
            height:300px;
            width:300px;
            border:0.5px dotted white;
            position:absolute;
            border-radius: 50%;
            animation: run 6s linear 0s infinite normal;
            transition: all 3s;
        }
        /*MERCURY*/
        #mercury{
            height:70px;
            width:70px;
            position:absolute;
            top:50px;
            left:-20px;
            border-radius: 50%;
            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_k4y19bko7IsrXZ_WRSZUsrD1FOHf_rIdRg&s);
            background-size: cover;
            background-position: center;
        }
        /*VENUS HARBIT*/
        #solarsystems{
            height:450px;
            width:450px;
            border:0.5px dotted white;
            position:absolute;
            border-radius: 50%;
            animation: run 10s linear 0s infinite normal;
            transition: all 3s;
        }
        /*VENUS*/
        #Venus{
            height:70px;
            width:70px;
            position:absolute;
            top:50px;
            left:10px;
            border-radius: 50%;
            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSgBwjInQ1Q8UfaGWLy2ajD4GVl3ZQSKv_TVA&s);
            background-size: cover;
            background-position: center;
        }
        /*EARTH HARBIT*/
        #solarsystemss{
            height:600px;
            width:600px;
            border:0.5px dotted white;
            position:absolute;
            border-radius: 50%;
            animation: run 13s linear 0s infinite normal;
            transition: all 3s;
        }
        /*EARTH*/
        #earth{
            height:70px;
            width:70px;
            position:absolute;
            top:50px;
            left:45px;
            border-radius: 50%;
            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVSa3oDjJJ-rUwGF7Aj-gre5spCct3CyUfKw&s);
            background-size: cover;
            background-position: center;
        }
        /*MARS HARBIT*/
        #solarsystemsss{
            height:750px;
            width:750px;
            border:0.5px dotted white;
            position:absolute;
            border-radius: 50%;
            animation: run 15s linear 0s infinite normal;
            transition: all 3s;
        }
        /*MARS*/
        #mars{
            height:70px;
            width:70px;
            position:absolute;
            top:70px;
            left:70px;
            border-radius: 50%;
            background-image: url(https://pngimg.com/uploads/mars_planet/mars_planet_PNG38.png);
            background-size: cover;
            background-position: center;
        }
        /*JUPITER HARBIT*/
        #solarsystemssss{
            height:900px;
            width:900px;
            border:0.5px dotted white;
            position:absolute;
            border-radius: 50%;
            animation: run 8s linear 0s infinite normal;
            transition: all 3s;
        }
        /*JUPITER */
        #Jupiter{
            height:70px;
            width:70px;
            position:absolute;
            top:70px;
            left:110px;
            border-radius: 50%;
            background-image: url(https://pngimg.com/d/jupiter_PNG3.png);
            background-size: cover;
            background-position: center;
        }
        /*SATURN HARBIT*/
        #solarsystemsssss{
            height:1050px;
            width:1050px;
            border:0.5px dotted white;
            position:absolute;
            border-radius: 50%;
            animation: run 12s linear 0s infinite normal;
            transition: all 3s;
        }
        /*SATURN */
        #Saturn{
            height:70px;
            width:70px;
            position:absolute;
            top:100px;
            left:130px;
            border-radius: 50%;
            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQazkS-pQlbH6SJuNvwXun8uiBubxk0IRLflQ&s);
            background-size: cover;
            background-position: center;
        }
        /*URANUS HARBIT*/
        #solarsystemssssss{
            height:1200px;
            width:1200px;
            border:0.5px dotted white;
            position:absolute;
            border-radius: 50%;
            animation: run 7s linear 0s infinite normal;
            transition: all 3s;
        }
        /*URANUS */
        #Uranus{
            height:70px;
            width:70px;
            position:absolute;
            top:140px;
            left:130px;
            border-radius: 50%;
            background-image: url(https://www.pngall.com/wp-content/uploads/15/Uranus-Transparent.png);
            background-size: cover;
            background-position: center;
        }
        /*NEPTUNE HARBIT*/
        #solarsystemsssssss{
            height:1350px;
            width:1350px;
            border:0.5px dotted white;
            position:absolute;
            border-radius: 50%;
            animation: run 13s linear 0s infinite normal;
            transition: all 3s;
        }
        /*NEPTUNE */
        #Neptune{
            height:70px;
            width:70px;
            position:absolute;
            top:190px;
            left:130px;
            border-radius: 50%;
            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKi4MkwsWASJeFmZCaKDPSRAgSXaIqTTxmvw&s);
            background-size: cover;
            background-position: center;
        }
        @keyframes run {
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div id="solarsystem">
        <div id="mercury"></div>
    </div>
    <div id="solarsystems">
        <div id="Venus"></div>
    </div>
    <div id="solarsystemss">
        <div id="earth"></div>
    </div>
    <div id="solarsystemsss">
        <div id="mars"></div>
    </div>
    <div id="solarsystemssss">
        <div id="Jupiter"></div>
    </div>
    <div id="solarsystemsssss">
        <div id="Saturn"></div>
    </div>
    <div id="solarsystemssssss">
        <div id="Uranus"></div>
    </div>
    <div id="solarsystemsssssss">
        <div id="Neptune"></div>
    </div>
    <div id="sun"></div>
</body>
</html>
