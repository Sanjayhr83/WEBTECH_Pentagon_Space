<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
        }
        #nav1{
            height:100px;
            background-color: gold;
            display:flex;
            justify-content: space-between;
            align-items:center;
            margin-bottom: 50px;
        }
        #logoblock,#menublock{
            height:140px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        #menublock>a{
            font-weight: bold;
            text-decoration: none;
            transition-property: all;
            transition-duration: 0.8s;
        }
        a:hover{
            color:white;
            border-bottom:2px solid black;
            transform: scale(1.3);
        }
        #logoblock>img{
            mix-blend-mode: multiply;
            padding: 35px;
        }
        nav{
            height:60px;
            background-color: #3A9AFF;
            display:flex;
            justify-content: space-between;
            align-items:center;
            padding-left:30px;
        }
        #Menu>a{
            color:white;
            height:55px;
            margin:15px;
            margin-bottom:25px;
            margin-top:20px;
            font-size: larger;
            text-decoration: none;   
        }
        #search{
            margin-right: 20px;
        }
        #searchbar{
            width:300px;
            padding: 12px;
        }
        #search1{
            height:40px;
            width: 40px;
            color:white;
            text-decoration: none;
            border:2px solid white;
            padding:10px;
        }
    </style>
</head>
<body>
    <!--main navbar-->
    <nav id="nav1">
        <div id="logoblock" >
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQe-HX4oq0R8-olvPHMnWRTSbepZk7rRvFvHw&sg" alt="" style="height: 90px; width:300px">
        </div>
        <div id="menublock" style="width: 400px;">
            <a href="">HOME</a>
            <a href="">ABOUT</a>
            <a href="">CONTACT</a>
            <a href="">LOGIN</a>
        </div>
    </nav>
    <!--nav1-->
    <nav>
        <div id="Menu">
            <a href="">Brand</a>
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Product</a>
        </div>
        <div id="search">
            <input id="searchbar" type="text" placeholder="Search">
            <a href="" id="search1">Search</a>
        </div>
    </nav>

    <!--nav2-->
    <nav style="background-color: black; margin-top:50px;">
        <div id="Menu">
            <a href="">Brand</a>
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Product</a>
        </div>
        <div id="search">
            <input id="searchbar" type="text" placeholder="Search">
            <a href="" id="search1">Search</a>
        </div>
    </nav>
    <!--nav3-->
    <nav style="background-color: rgb(198, 213, 214); margin-top: 50px;">
        <div id="Menu">
            <a href="">Brand</a>
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Product</a>
        </div>
        <div id="search">
            <input id="searchbar" type="text" placeholder="Search">
            <a href="" id="search1" style="color:rgb(0, 0, 229); border-color:blue ;">Search</a>
        </div>
    </nav>
</body>
</html>
