<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--create a form using table -->
    <fieldset>
        <table>
            <tr>
                <td><label for="fname">First name</label></td>
                <td><input type="text" id="fname">(max 20 char a-z and A-Z)</td>
            </tr>
            <tr>
                <td><label for="lname">Last name </label></td>
                <td><input type="text" id="lname">(max 20 char a-z and A-Z)</td>
            </tr>
            <tr>
                <td><label for="dob">Date of Birth</label></td>
                <td><input type="date" id="dob"></td>
            </tr>
            <tr>
                <td><label for="gender">GENDER</label></td>
                <td>
                    <input type="checkbox" id="gender">Male
                    <input type="checkbox" id="gender">Female
                </td>
            </tr>
            <tr>
                <td><label for="email">EMAIL ID</label></td>
                <td><input type="email" id="email"></td>
            </tr>
            <tr>
                <td><label for="mobile">MOBILE NO</label></td>
                <td><INPUT type="number" maxlength="10"></INPUT></td>
            </tr>
            <tr>
                <td><label for="address">Address</label></td>
                <td>
                    <textarea name="address" id="address"></textarea>
                </td>
            </tr>
            <tr>
                <td><label for="city">CITY</label></td>
                <td><input type="text" id="city"></td>
            </tr>
            <tr>
                <td><label for="pin">PINCODE</label></td>
                <td><input type="number" id="pin">(6 digit number)</td>
            </tr>
            <tr>
                <td><label for="email">EMAIL ID</label></td>
                <td><input type="email" id="email"></td>
            </tr>
            <tr>
                <td><label for="state">STATE</label></td>
                <td><input type="text" id="state"></td>
            </tr>
            <tr>
                <td><label for="country">COUNTRY</label></td>
                <td><input type="text" id="country"></td>
            </tr>
            <tr>
                <td><label for="hobbies">HOBBIES</label></td>
                <td>
                    <input type="checkbox" id="Drawing">Drawing
                    <input type="checkbox" id="singing">Singing
                    <input type="checkbox" id="dancing">Dancing
                    <input type="checkbox" id="other">other<input type="text">
                </td>
            </tr>
            <tr>
                <td><label for="Qualification">Qualification:</label></td>
                <td>
                    <table>
                    <tr>
                        <td>sl.no</td>
                        <td>Examination</td>
                        <td>Board</td>
                        <td>Percenatge</td>
                        <td>Year OF Passing</td>
                    </tr>
                    <tr>
                        <td><label for="01" name="1st ">01</label></td>
                        <td><input type="text" id="Examination01"></td>
                        <td><input type="text" id="board01"></td>
                        <td><input type="text" id="percentage01"></td>
                        <td><input type="text" id="year01"></td>
                    </tr>
                    <tr>
                        <td>02</td>
                        <td><input type="text" id="Examination02"></td>
                        <td><input type="text" id="board02"></td>
                        <td><input type="text" id="percentage02"></td>
                        <td><input type="text" id="year02"></td>
                    </tr>
                    <tr>
                        <td>03</td>
                        <td><input type="text" id="Examination03"></td>
                        <td><input type="text" id="board03"></td>
                        <td><input type="text" id="percentage03"></td>
                        <td><input type="text" id="year03"></td>
                    </tr>
                    <tr>
                        <td>04</td>
                        <td><input type="text" id="Examination04"></td>
                        <td><input type="text" id="board04"></td>
                        <td><input type="text" id="percentage04"></td>
                        <td><input type="text" id="year04"></td>
                    </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="course">COURSE APPLIED FOR</label>
                </td>
                <td>
                    <input type="checkbox" id="course1">BCA
                    <input type="checkbox" id="course2">B.sc
                    <input type="checkbox" id="course3">B.com
                    <input type="checkbox" id="course4">BBA
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <button type="submit">Submit</button>
                    <button type="reset">Reset</button>
                </td>
            </tr>
        </table>
    </fieldset>
</body>
</html>
