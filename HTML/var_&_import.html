<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variable and import</title>
    <style>
        /*variable in CSS*/
        :root{
            --jathre:#FF5A5A;
            --mafaka:#853953;
        }
        h2,h3{
            background-color: var(--jathre);
        }

        /*import*/
        @import url("./style.css");
        @import "style.css";
    </style>
</head>
<body>
    <h1>welcome</h1>
    <h2>hii</h2>
    <h3>how are you</h3>
</body>
</html>
