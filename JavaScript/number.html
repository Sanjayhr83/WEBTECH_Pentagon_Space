<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Number</h1>
    <p>In JavaScript, there is only one type of number: <strong>Number</strong>, which can represent both integers and floating-point numbers.</p>
    <p>Example of creating numbers:</p> 
    <pre><code>var num=100; //integer
    var num2=100.123; //floating-point number
</code></pre>
    <script>
        var num=100;
        var num2=100.123;
        console.log(num);
        console.log(num2);
        console.log(typeof num);
        console.log(typeof num2);
        

        var num3=1e3; //1000
        var num4=1e-3; //0.001
        console.log(num3);
        console.log(num4);
        console.log(typeof num3);
        console.log(typeof num4);


        var num5=0xff; //255
        console.log(num5);
        console.log(typeof num5);

        var a=1/0; //Infinity
        var b=-1/0; //-Infinity
        var c=0/0; //NaN
        console.log(a);
        console.log(b);
        console.log(c);
        console.log(typeof a);
        console.log(typeof b);
        console.log(typeof c);
    </script>
</body>
</html>
