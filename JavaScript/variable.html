<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JS VARIABLES( VAR, LET, CONST)</h1>


    <script>
        var a;  //declaration
        var a =10;  //initialization
        a=100;  //re-assignment
        var a=1000;  //re-declaration
        console.log(a);

        let b;  //declaration
        let c=20;  //declaration + initialization
        b=200;  //re-assignment
        //let c=2000;  //re-declaration is not allowed in let
        console.log(b);

        //const d;  //declaration is not allowed in const
        const d=30;  //declaration + initialization
        //d=300;  //re-assignment is not allowed in const
        //const d=3000;  //re-declaration is not allowed in const
        console.log(d);
    </script>
</body>
</html>
