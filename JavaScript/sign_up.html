<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up</title>
</head>

<body>
    <center>
        <h1>Sign up</h1>
    </center>

    <center>
        <input type="text" placeholder="Enter username" id="a"><br>
        <input type="text" placeholder="Enter email" id="b"><br>
        <input type="text" placeholder="Enter password" id="c"><br>
        <button onclick=signup()>sign-up</button>

    </center>



    <script>
        function signup() {
            let username = document.getElementById("a").value;
            let email = document.getElementById("b").value;
            let password = document.getElementById("c").value;

            localStorage.setItem("username", username);
            localStorage.setItem("email", email);
            localStorage.setItem("password", password);
            alert("Data saved......");
            window.location.href = "login.html";
        }
    </script>
</body>

</html>
